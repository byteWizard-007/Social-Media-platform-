<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #0ea5e9
            );
            overflow:hidden;
        }

        .bg-circle{
            position:absolute;
            border-radius:50%;
            filter:blur(80px);
            opacity:.4;
        }

        .c1{
            width:300px;
            height:300px;
            background:#38bdf8;
            top:-100px;
            left:-100px;
        }

        .c2{
            width:250px;
            height:250px;
            background:#8b5cf6;
            bottom:-80px;
            right:-80px;
        }

        .login-box{
            width:420px;
            padding:40px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:25px;
            box-shadow:0 20px 50px rgba(0,0,0,.4);
            z-index:2;
        }

        .logo{
            text-align:center;
            color:#fff;
            margin-bottom:30px;
        }

        .logo h1{
            font-size:34px;
        }

        .logo p{
            color:#cbd5e1;
            margin-top:5px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            color:white;
            display:block;
            margin-bottom:8px;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,.12);
            color:white;
        }

        .input-group input::placeholder{
            color:#cbd5e1;
        }

        .options{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
            color:white;
            font-size:14px;
        }

        .options a{
            color:#38bdf8;
            text-decoration:none;
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#38bdf8;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            transform:translateY(-3px);
        }

        .divider{
            text-align:center;
            color:#cbd5e1;
            margin:20px 0;
        }

        .social{
            display:flex;
            gap:10px;
        }

        .social button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .google{
            background:white;
        }

        .github{
            background:#111827;
            color:white;
        }

        .bottom{
            margin-top:20px;
            text-align:center;
            color:white;
        }

        .bottom a{
            color:#38bdf8;
            text-decoration:none;
        }

        @media(max-width:500px){

            .login-box{
                width:90%;
                padding:25px;
            }

        }

    </style>

</head>
<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="login-box">

    <div class="logo">
        <h1>ConnectHub</h1>
        <p>Welcome Back</p>
    </div>

    <form id="loginForm">

        <div class="input-group">
            <label>Email</label>
            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn">
            Login
        </button>

    </form>

    <div class="divider">
        OR
    </div>

    <div class="social">

        <button class="google">
            Google
        </button>

        <button class="github">
            GitHub
        </button>

    </div>

    <div class="bottom">
        Don't have an account?
        <a href="register.html">
            Register
        </a>
    </div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",(e)=>{

    e.preventDefault();

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    if(email && password){

        localStorage.setItem(
            "connecthub_user",
            email
        );

        alert("Login Successful");

        window.location.href =
            "index.html";
    }

});

</script>

</body>
</html>
